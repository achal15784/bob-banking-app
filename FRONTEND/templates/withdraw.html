{% extends "base.html" %}

{% block title %}Withdraw — Banking App{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-7 col-lg-5">

    <h3 class="mb-4">Withdraw Funds</h3>

    {% if balance is defined %}
      <p class="text-muted mb-3">
        Available balance: <strong>£{{ "%.2f"|format(balance) }}</strong>
      </p>
    {% endif %}

    {% if error %}
      <div class="alert alert-danger" role="alert">{{ error }}</div>
    {% endif %}

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form action="{{ url_for('transactions.withdraw') }}" method="POST" novalidate>
          <div class="mb-4">
            <label for="amount" class="form-label fw-semibold">Amount (£)</label>
            <input
              type="number"
              id="amount"
              name="amount"
              class="form-control form-control-lg"
              placeholder="0.00"
              step="0.01"
              min="0.01"
            />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-warning btn-lg">Withdraw</button>
          </div>
        </form>
      </div>
    </div>

    <a href="{{ url_for('dashboard') }}" class="btn btn-link mt-3 ps-0">
      ← Back to Dashboard
    </a>

  </div>
</div>
{% endblock %}
