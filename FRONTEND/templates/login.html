{% extends "base.html" %}

{% block title %}Login — Banking App{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-5 col-xl-4">

    <div class="card shadow-sm">
      <div class="card-body p-4">

        <h2 class="card-title text-center mb-4">
          🏦 Banking App
        </h2>
        <h5 class="text-center text-muted mb-4">Welcome — please sign in</h5>

        {% if error %}
          <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}

        <form action="{{ url_for('auth.login') }}" method="POST" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              class="form-control"
              autocomplete="username"
              required
            />
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              autocomplete="current-password"
              required
            />
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
          </div>
        </form>

        <p class="text-center text-muted mt-4 mb-0" style="font-size:0.85rem;">
          Test accounts: <strong>alice</strong> / password123 &nbsp;|&nbsp; <strong>bob</strong> / password123
        </p>

      </div>
    </div>

  </div>
</div>
{% endblock %}
